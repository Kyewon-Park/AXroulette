  function getNames() {
    const value = document.querySelector('#in_names').value.trim();
    return value.split(/[,\r\n]/g).map((v) => v.trim()).filter((v) => !!v);
  }

  function parseName(nameStr) {
    const weightRegex = /(\/\d+)/;
    const countRegex = /(\*\d+)/;
    const hasWeight = weightRegex.test(nameStr);
    const hasCount = countRegex.test(nameStr);
    const name = /^\s*([^\/*]+)?/.exec(nameStr)[1];
    const weight = hasWeight ? parseInt(weightRegex.exec(nameStr)[1].replace('/', ''), 10) : 1;
    const count = hasCount ? parseInt(countRegex.exec(nameStr)[1].replace('*', ''), 10) : 1;
    return { name, weight, count };
  }

  let ready = false;
  let selectedMapIndex = 0;

  function setStatus(message) {
    document.querySelector('#statusLine').textContent = message;
  }

  function ensureCourseDescription() {
    let description = document.querySelector('#courseDescription');
    if (description) return description;

    description = document.createElement('p');
    description.id = 'courseDescription';
    document.querySelector('#statusLine').before(description);
    return description;
  }

  function ensureMapPicker() {
    if (!document.querySelector('#mapCards')) {
      const section = document.createElement('section');
      section.className = 'map-picker';

      const pickerHead = document.createElement('div');
      pickerHead.className = 'picker-head';

      const title = document.createElement('span');
      title.textContent = 'Map Select';

      const copy = document.createElement('small');
      copy.textContent = 'Choose the course before you launch the run.';

      const cards = document.createElement('div');
      cards.id = 'mapCards';
      cards.className = 'map-cards';

      pickerHead.append(title, copy);
      section.append(pickerHead, cards);
      document.querySelector('.field-grid').before(section);
    }

    const courseLabel = document.querySelector('.field-grid .field span');
    if (courseLabel) {
      courseLabel.textContent = 'Map Menu';
    }

    const toggleLabel = document.querySelector('.toggle span');
    if (toggleLabel) {
      toggleLabel.textContent = 'Bonus effects and hunters';
    }
  }

  function setCourseInfo(course) {
    if (!course) return;
    ensureCourseDescription();
    document.querySelector('#courseName').textContent = course.title;
    document.querySelector('#courseDescription').textContent = course.description;
  }

  function refreshMapSelection(index) {
    selectedMapIndex = index;
    document.querySelector('#sltMap').value = `${index}`;
    document.querySelectorAll('.map-card').forEach((card) => {
      const isSelected = parseInt(card.dataset.index, 10) === index;
      card.classList.toggle('is-selected', isSelected);
      card.setAttribute('aria-pressed', `${isSelected}`);
    });
    setCourseInfo(window.roulette.getMaps()[index]);
  }

  function renderMapCards(maps) {
    ensureMapPicker();
    const mapCards = document.querySelector('#mapCards');
    mapCards.innerHTML = '';

    maps.forEach((map) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'map-card';
      button.dataset.index = `${map.index}`;

      const badge = document.createElement('span');
      badge.className = 'map-badge';
      badge.textContent = `MAP ${map.index + 1}`;

      const title = document.createElement('strong');
      title.textContent = map.title;

      const description = document.createElement('small');
      description.textContent = map.description;

      button.append(badge, title, description);
      button.addEventListener('click', () => {
        applyMapSelection(map.index);
      });
      mapCards.append(button);
    });
  }

  function applyMapSelection(index, shouldSync = true) {
    const maps = window.roulette.getMaps();
    const safeIndex = Math.max(0, Math.min(maps.length - 1, index));
    localStorage.setItem(MAP_STORAGE_KEY, `${safeIndex}`);
    window.roulette.setMap(safeIndex);
    refreshMapSelection(safeIndex);
    if (shouldSync) {
      syncRoster();
    }
  }

  window.addEventListener('error', (event) => {
    console.error('[window.error]', event.error || event.message);
    setStatus(`JS error: ${event.message}`);
  });

  window.addEventListener('unhandledrejection', (event) => {
    console.error('[unhandledrejection]', event.reason);
    const reason = event.reason instanceof Error ? event.reason.message : String(event.reason);
    setStatus(`Promise error: ${reason}`);
  });

  function normalizeNames() {
    const nameSource = getNames();
    const nameSet = new Set();
    const nameCounts = {};

    nameSource.forEach((nameSrc) => {
      const name = parseName(nameSrc);
      const key = name.weight > 1 ? `${name.name}/${name.weight}` : name.name;
      if (!nameSet.has(key)) {
        nameSet.add(key);
        nameCounts[key] = 0;
      }
      nameCounts[key] += name.count;
    });

    const result = [];
    Object.keys(nameCounts).forEach((key) => {
      if (nameCounts[key] > 1) {
        result.push(`${key}*${nameCounts[key]}`);
      } else {
        result.push(key);
      }
    });

    document.querySelector('#in_names').value = result.join(',');
  }

  function syncRoster() {
    const names = getNames();
    window.roulette.setMarbles(names);
    ready = names.length > 0;
    localStorage.setItem(NAME_STORAGE_KEY, names.join(','));
    localStorage.setItem(ROSTER_VERSION_STORAGE_KEY, DEFAULT_ROSTER_VERSION);

    const total = window.roulette.getCount();
    const rankInput = document.querySelector('#in_winningRank');
    const parsed = parseInt(rankInput.value, 10);
    const nextRank = Math.max(1, Math.min(total || 1, isNaN(parsed) ? 1 : parsed));
    rankInput.value = nextRank;
    window.options.winningRank = nextRank - 1;
    window.roulette.setWinningRank(window.options.winningRank);

    document.querySelector('#rosterCount').textContent = `${total}`;
    setCourseInfo(window.roulette.getStageInfo());
    setStatus(ready ? `Roster synced. ${total} marbles loaded.` : 'Add names to arm the race.');
  }

  function hidePanel() {
    document.body.classList.add('race-live');
  }

  function showPanel() {
    document.body.classList.remove('race-live');
  }

    });

    document.querySelector('#in_names').addEventListener('blur', () => {
      normalizeNames();
      syncRoster();
    });

    document.querySelector('#btnPrime').addEventListener('click', () => {
      normalizeNames();
      syncRoster();
    });

    document.querySelector('#btnStart').addEventListener('click', () => {
      if (!ready) return;
      window.roulette.start();
      hidePanel();
      setStatus('Race live. Control panel hidden until target rank locks.');
    });

    document.querySelector('#chkSkill').addEventListener('change', (e) => {
      window.options.useSkills = e.target.matches(':checked');
      setStatus(window.options.useSkills ? 'AI boosts and hunter hazards enabled.' : 'Bonus items disabled.');
    });

    document.querySelector('#in_winningRank').addEventListener('change', (e) => {
      const value = parseInt(e.target.value, 10);
      const total = Math.max(window.roulette.getCount(), 1);
      const rank = Math.max(1, Math.min(total, isNaN(value) ? 1 : value));
      e.target.value = rank;
      window.options.winningRank = rank - 1;
      window.roulette.setWinningRank(window.options.winningRank);
    });

    window.roulette.addEventListener('goal', (e) => {
      ready = false;
      setStatus(`${e.detail.winner} locked the target rank. Panel restored.`);
      setTimeout(showPanel, 1200);
    });

    window.roulette.addEventListener('message', (e) => {
      setStatus(e.detail);
    });

    const savedMap = parseInt(localStorage.getItem(MAP_STORAGE_KEY) || '0', 10);
    const initialMap = Number.isNaN(savedMap) ? 0 : Math.max(0, Math.min(maps.length - 1, savedMap));
    applyMapSelection(initialMap, false);
    syncRoster();
  }
</script>

<div id="controlPanel" class="control-panel">
  <div class="panel-head">
    <div>
      <p class="eyebrow">Neon Drop</p>
      <h1>AX roulette</h1>
    </div>
    <div class="roster-pill">
      <span>Roster</span>
      <strong id="rosterCount">0</strong>
    </div>
  </div>

  <div class="field-grid">
    <label class="field">
      <span>Course</span>
      <select id="sltMap"></select>
    </label>
    <label class="field">
      <span>Winner Rank</span>
      <input type="number" id="in_winningRank" value="1" min="1">
    </label>
  </div>

  <label class="toggle">
    <span>AI bubbles + 현업/사장님</span>
    <input type="checkbox" id="chkSkill" checked>
  </label>

  <label class="field">
    <span>Roster Input</span>
    <textarea id="in_names" placeholder="One name per line or comma separated"></textarea>
  </label>

  <div class="actions">
    <button id="btnPrime" class="btn ghost">Sync</button>
    <button id="btnStart" class="btn primary">Start Race</button>
  </div>

  <div class="status-box">
    <span id="courseName">Manual Work</span>
    <p id="statusLine">Waiting for roster sync.</p>
  </div>
</div>
</body>
</html>

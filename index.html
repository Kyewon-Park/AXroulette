<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Neon Drop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A long neon race track with boost bubbles and roaming hazard hunters.">
  <link rel="apple-touch-icon" sizes="57x57" href="assets/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="assets/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="assets/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="assets/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="assets/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="assets/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="assets/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="manifest" href="assets/manifest.json">
  <meta name="theme-color" content="#08111d">
  <link rel="stylesheet" href="assets/style.scss">
</head>
<body>
<script type="module" src="./src/index.ts"></script>
<script type="text/javascript">
  function getNames() {
    const value = document.querySelector('#in_names').value.trim();
    return value.split(/[,\r\n]/g).map((v) => v.trim()).filter((v) => !!v);
  }

  function parseName(nameStr) {
    const weightRegex = /(\/\d+)/;
    const countRegex = /(\*\d+)/;
    const hasWeight = weightRegex.test(nameStr);
    const hasCount = countRegex.test(nameStr);
    const name = /^\s*([^\/*]+)?/.exec(nameStr)[1];
    const weight = hasWeight ? parseInt(weightRegex.exec(nameStr)[1].replace('/', ''), 10) : 1;
    const count = hasCount ? parseInt(countRegex.exec(nameStr)[1].replace('*', ''), 10) : 1;
    return { name, weight, count };
  }

  let ready = false;

  function setStatus(message) {
    document.querySelector('#statusLine').textContent = message;
  }

  window.addEventListener('error', (event) => {
    console.error('[window.error]', event.error || event.message);
    setStatus(`JS error: ${event.message}`);
  });

  window.addEventListener('unhandledrejection', (event) => {
    console.error('[unhandledrejection]', event.reason);
    const reason = event.reason instanceof Error ? event.reason.message : String(event.reason);
    setStatus(`Promise error: ${reason}`);
  });

  function normalizeNames() {
    const nameSource = getNames();
    const nameSet = new Set();
    const nameCounts = {};

    nameSource.forEach((nameSrc) => {
      const name = parseName(nameSrc);
      const key = name.weight > 1 ? `${name.name}/${name.weight}` : name.name;
      if (!nameSet.has(key)) {
        nameSet.add(key);
        nameCounts[key] = 0;
      }
      nameCounts[key] += name.count;
    });

    const result = [];
    Object.keys(nameCounts).forEach((key) => {
      if (nameCounts[key] > 1) {
        result.push(`${key}*${nameCounts[key]}`);
      } else {
        result.push(key);
      }
    });

    document.querySelector('#in_names').value = result.join(',');
  }

  function syncRoster() {
    const names = getNames();
    window.roulette.setMarbles(names);
    ready = names.length > 0;
    localStorage.setItem('neon_drop_names', names.join(','));

    const total = window.roulette.getCount();
    const rankInput = document.querySelector('#in_winningRank');
    const parsed = parseInt(rankInput.value, 10);
    const nextRank = Math.max(1, Math.min(total || 1, isNaN(parsed) ? 1 : parsed));
    rankInput.value = nextRank;
    window.options.winningRank = nextRank - 1;
    window.roulette.setWinningRank(window.options.winningRank);

    document.querySelector('#rosterCount').textContent = `${total}`;
    document.querySelector('#courseName').textContent = window.roulette.getStageInfo().title;
    setStatus(ready ? `Roster synced. ${total} marbles loaded.` : 'Add names to arm the race.');
  }

  function hidePanel() {
    document.body.classList.add('race-live');
  }

  function showPanel() {
    document.body.classList.remove('race-live');
  }

  document.addEventListener('DOMContentLoaded', () => {
    initialize();
  });

  function initialize() {
    if (!window.roulette || !window.roulette.isReady) {
      setTimeout(initialize, 100);
      return;
    }

    const saved = localStorage.getItem('neon_drop_names');
    document.querySelector('#in_names').value =
      saved || 'Soyeon\nMinji\nAri\nTheo\nLuca\nYuri\nNina\nEvan';

    const maps = window.roulette.getMaps();
    const mapSelector = document.querySelector('#sltMap');
    maps.forEach((map) => {
      const option = document.createElement('option');
      option.value = map.index;
      option.textContent = map.title;
      mapSelector.append(option);
    });

    mapSelector.addEventListener('change', (e) => {
      window.roulette.setMap(parseInt(e.target.value, 10));
      syncRoster();
    });

    document.querySelector('#in_names').addEventListener('blur', () => {
      normalizeNames();
      syncRoster();
    });

    document.querySelector('#btnPrime').addEventListener('click', () => {
      normalizeNames();
      syncRoster();
    });

    document.querySelector('#btnStart').addEventListener('click', () => {
      if (!ready) return;
      window.roulette.start();
      hidePanel();
      setStatus('Race live. Control panel hidden until target rank locks.');
    });

    document.querySelector('#chkSkill').addEventListener('change', (e) => {
      window.options.useSkills = e.target.matches(':checked');
      setStatus(window.options.useSkills ? 'AI boosts and hunter hazards enabled.' : 'Bonus items disabled.');
    });

    document.querySelector('#in_winningRank').addEventListener('change', (e) => {
      const value = parseInt(e.target.value, 10);
      const total = Math.max(window.roulette.getCount(), 1);
      const rank = Math.max(1, Math.min(total, isNaN(value) ? 1 : value));
      e.target.value = rank;
      window.options.winningRank = rank - 1;
      window.roulette.setWinningRank(window.options.winningRank);
    });

    window.roulette.addEventListener('goal', (e) => {
      ready = false;
      setStatus(`${e.detail.winner} locked the target rank. Panel restored.`);
      setTimeout(showPanel, 1200);
    });

    window.roulette.addEventListener('message', (e) => {
      setStatus(e.detail);
    });

    syncRoster();
  }
</script>

<div id="controlPanel" class="control-panel">
  <div class="panel-head">
    <div>
      <p class="eyebrow">TRON Circuit</p>
      <h1>Neon Drop</h1>
    </div>
    <div class="roster-pill">
      <span>Roster</span>
      <strong id="rosterCount">0</strong>
    </div>
  </div>

  <div class="field-grid">
    <label class="field">
      <span>Course</span>
      <select id="sltMap"></select>
    </label>
    <label class="field">
      <span>Winner Rank</span>
      <input type="number" id="in_winningRank" value="1" min="1">
    </label>
  </div>

  <label class="toggle">
    <span>AI bubbles + SDS/CNS/Autoever</span>
    <input type="checkbox" id="chkSkill" checked>
  </label>

  <label class="field">
    <span>Roster Input</span>
    <textarea id="in_names" placeholder="One name per line or comma separated"></textarea>
  </label>

  <div class="actions">
    <button id="btnPrime" class="btn ghost">Sync</button>
    <button id="btnStart" class="btn primary">Start Race</button>
  </div>

  <div class="status-box">
    <span id="courseName">Manual Work</span>
    <p id="statusLine">Waiting for roster sync.</p>
  </div>
</div>
</body>
</html>
